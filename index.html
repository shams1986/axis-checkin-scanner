<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- Нормальный размер на телефоне и планшете -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AXIS Check-In Scanner</title>

  <!-- Nimiq QR Scanner -->
  <script type="module">

    import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";

    // Worker для QR Scanner
    QrScanner.WORKER_PATH =
      "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js";

    // Apps Script Web App URL
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycby_D4IOfvuZbyheCOxZINd5x2tX6DD6iv6AtDOwcxSDgmYHq0jjjKytEDLOxBfGezJiKw/exec";

    // Через сколько секунд возвращаться к Ready экрану
    const RESET_DELAY_MS = 5200;

    // Защита от повторного срабатывания одного QR
    let scanLocked = false;

    // AudioContext для звуков
    let audioContext = null;

    // HTML элементы
    let video;
    let app;
    let readyTitle;
    let readySubtitle;
    let resultTitle;
    let resultName;
    let resultTraining;
    let messageLabel;
    let messageText;
    let debug;
    let soundHint;


    /**
     * LOCAL_MESSAGES
     *
     * Временные сообщения для check-in.
     *
     * Сейчас они живут в index.html.
     * Позже перенесём их в Apps Script API,
     * чтобы система могла учитывать:
     * - тип тренировки
     * - кто уже пришёл
     * - streak
     * - kids/adults
     * - количество тренировок
     */
    const LOCAL_MESSAGES = [
      {
        label: "🥋 Trainingsfokus",
        text: "Technik zuerst, Kraft später. Heute sauber arbeiten."
      },
      {
        label: "🔥 Kleine Challenge",
        text: "Mach heute eine Technik besser als beim letzten Mal."
      },
      {
        label: "😄 Matten-Mission",
        text: "Such dir heute einen Partner und hilf ihm bei einer Technik."
      },
      {
        label: "💪 Tagesziel",
        text: "100% Einsatz. Kein Ego. Nur Jiu-Jitsu."
      },
      {
        label: "😎 Coach sagt",
        text: "Trainiere hart, aber schlau. Verletzungsfrei ist auch ein Sieg."
      },
      {
        label: "🎯 Heute wichtig",
        text: "Ein guter Escape zählt mehr als zehn wilde Angriffe."
      },
      {
        label: "⚡ Mini-Aufgabe",
        text: "Frag heute jemanden nach seinem Lieblings-Setup."
      },
      {
        label: "🏆 Challenge",
        text: "Mach heute einen sauberen Armbar-Drill — kontrolliert und technisch."
      }
    ];


    /**
     * unlockSound()
     *
     * Mobile Browser blockieren oft Sound,
     * bis der Nutzer einmal auf den Bildschirm tippt.
     */
    function unlockSound() {

      try {

        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        audioContext.resume();

        if (soundHint) {
          soundHint.style.display = "none";
        }

      } catch (err) {
        // Wenn Sound blockiert bleibt, läuft Check-In trotzdem weiter
      }
    }


    /**
     * playTone(frequency, startTime, duration, volume)
     *
     * Spielt einen einzelnen Ton.
     */
    function playTone(frequency, startTime, duration, volume) {

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;

      gain.gain.setValueAtTime(0.001, startTime);
      gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }


    /**
     * playSound(type)
     *
     * Spielt verschiedene Sounds:
     * success   = erfolgreicher Check-In
     * duplicate = bereits eingecheckt
     * error     = Fehler
     */
    function playSound(type) {

      try {

        if (!audioContext) {
          return;
        }

        const now = audioContext.currentTime;

        if (type === "success") {

          // Positiver kurzer Check-In Sound
          playTone(660, now, 0.18, 0.45);
          playTone(880, now + 0.14, 0.18, 0.45);
          playTone(1175, now + 0.28, 0.22, 0.38);

        } else if (type === "duplicate") {

          // Warnsound für bereits eingecheckt
          playTone(420, now, 0.18, 0.42);
          playTone(420, now + 0.25, 0.18, 0.42);

        } else {

          // Fehlersound
          playTone(220, now, 0.35, 0.45);
        }

      } catch (err) {
        // Soundfehler sollen Check-In nicht stoppen
      }
    }


    /**
     * vibrate(type)
     *
     * Leichte Vibration am Handy,
     * wenn der Browser es unterstützt.
     */
    function vibrate(type) {

      if (!navigator.vibrate) {
        return;
      }

      if (type === "success") {
        navigator.vibrate(80);
      } else if (type === "duplicate") {
        navigator.vibrate([60, 60, 60]);
      } else {
        navigator.vibrate(200);
      }
    }


    /**
     * getRandomLocalMessage(data)
     *
     * Wählt aktuell eine lokale Nachricht aus.
     *
     * Später kann data.message direkt vom Apps Script API kommen.
     */
    function getRandomLocalMessage(data) {

      // Wenn API später eine eigene Message schickt, nehmen wir diese
      if (data && data.message) {
        return {
          label: data.messageLabel || "🥋 Heute",
          text: data.message
        };
      }

      const index = Math.floor(Math.random() * LOCAL_MESSAGES.length);

      return LOCAL_MESSAGES[index];
    }


    /**
     * setReadyScreen()
     *
     * Zeigt den normalen Scanner-Startbildschirm.
     */
    function setReadyScreen() {

      app.className = "app mode-ready";

      readyTitle.innerText = "Ready for Check-In";
      readySubtitle.innerText = "QR Code vor die Kamera halten";

      debug.innerText = "Kamera aktiv";
    }


    /**
     * showResult(data)
     *
     * Zeigt das Ergebnis vom Apps Script API.
     *
     * Bei Erfolg:
     * - links Check-In erfolgreich + Name
     * - rechts Tipp / Challenge / Hinweis
     */
    function showResult(data) {

      const result = data.result || "success";
      const trainingName = data.trainingName || "Training";

      app.className = "app mode-result";

      resultTitle.innerText = data.title || "Check-In erfolgreich!";
      resultTitle.style.color = data.color || "#4CAF50";

      resultName.innerText = data.vorname || "";

      if (result === "success") {
        resultTraining.innerText = "Willkommen zum " + trainingName + "!";
      } else {
        resultTraining.innerText = data.subtitle || "";
      }

      const localMessage = getRandomLocalMessage(data);

      if (result === "success") {
        messageLabel.innerText = localMessage.label;
        messageText.innerText = localMessage.text;
      }

      if (result === "duplicate") {
        messageLabel.innerText = "🏆 Schon dabei?";
        messageText.innerText = "Du bist bereits angemeldet. Hilf heute jemandem auf der Matte.";
      }

      if (result === "not_found" || result === "error" || result === "invalid") {
        messageLabel.innerText = "⚠ Hinweis";
        messageText.innerText = data.subtitle || "Bitte Trainer informieren.";
      }

      debug.innerText = data.memberId || "Kamera aktiv";

      playSound(data.sound || "success");
      vibrate(data.sound || "success");

      setTimeout(function () {
        scanLocked = false;
        setReadyScreen();
      }, RESET_DELAY_MS);
    }


    /**
     * extractMemberId(scannedText)
     *
     * Holt MemberID aus QR-Code.
     *
     * Erwartet:
     * WEB_APP_URL?id=AJJ010
     */
    function extractMemberId(scannedText) {

      const text = String(scannedText).trim();

      try {

        const url = new URL(text);
        const id = url.searchParams.get("id");

        if (id) {
          return id;
        }

      } catch (err) {
        // Wenn QR kein URL ist, probieren wir regex unten
      }

      const match = text.match(/[?&]id=([^&]+)/);

      if (match) {
        return decodeURIComponent(match[1]);
      }

      // Falls QR später nur AJJ010 enthält
      if (/^AJJ[0-9]+$/i.test(text)) {
        return text;
      }

      return null;
    }


    /**
     * callCheckinApi(memberId)
     *
     * Sendet MemberID an Apps Script API,
     * ohne die GitHub Scanner Seite zu verlassen.
     */
    function callCheckinApi(memberId) {

      const callbackName =
        "axisCheckinCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      const script = document.createElement("script");

      window[callbackName] = function (data) {

        // Temporären callback und script entfernen
        delete window[callbackName];
        script.remove();

        // Ergebnis anzeigen
        showResult(data);
      };

      script.onerror = function () {

        delete window[callbackName];
        script.remove();

        showResult({
          result: "error",
          memberId: memberId,
          vorname: "",
          title: "❌ Verbindung Fehler",
          subtitle: "Bitte erneut versuchen.",
          color: "#F44336",
          sound: "error"
        });
      };

      script.src =
        WEB_APP_URL +
        "?api=checkin" +
        "&id=" + encodeURIComponent(memberId) +
        "&callback=" + encodeURIComponent(callbackName) +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }


    /**
     * onScanSuccess(result)
     *
     * Wird ausgelöst, wenn QR erkannt wurde.
     */
    function onScanSuccess(result) {

      if (scanLocked) {
        return;
      }

      scanLocked = true;

      const scannedText = result.data || result;
      const memberId = extractMemberId(scannedText);

      if (!memberId) {

        showResult({
          result: "invalid",
          memberId: "",
          vorname: "",
          title: "❌ Ungültiger QR Code",
          subtitle: "Bitte Trainer informieren.",
          color: "#F44336",
          sound: "error"
        });

        return;
      }

      app.className = "app mode-loading";

      readyTitle.innerText = "Check-In läuft...";
      readySubtitle.innerText = "Bitte kurz warten.";
      debug.innerText = memberId;

      callCheckinApi(memberId);
    }


    /**
     * startScanner()
     *
     * Startet Kamera und QR Scanner.
     */
    async function startScanner() {

      video = document.getElementById("camera");
      app = document.getElementById("app");

      readyTitle = document.getElementById("readyTitle");
      readySubtitle = document.getElementById("readySubtitle");

      resultTitle = document.getElementById("resultTitle");
      resultName = document.getElementById("resultName");
      resultTraining = document.getElementById("resultTraining");

      messageLabel = document.getElementById("messageLabel");
      messageText = document.getElementById("messageText");

      debug = document.getElementById("debug");
      soundHint = document.getElementById("soundHint");

      try {

        const scanner = new QrScanner(
          video,
          onScanSuccess,
          {
            preferredCamera: "environment",
            maxScansPerSecond: 30,
            returnDetailedScanResult: true
          }
        );

        await scanner.start();

        setReadyScreen();

      } catch (err) {

        app.className = "app mode-error";

        readyTitle.innerText = "Kamera konnte nicht gestartet werden";
        readySubtitle.innerText = "Bitte Kamera-Berechtigung prüfen.";
        debug.innerText = String(err);
      }
    }


    // Sound durch ersten Tap aktivieren
    document.addEventListener("click", unlockSound);
    document.addEventListener("touchstart", unlockSound);

    // Scanner starten, sobald die Seite geladen ist
    window.addEventListener("DOMContentLoaded", startScanner);

  </script>

  <style>

    body {
      margin: 0;
      padding: 0;

      background: #050505;
      color: white;

      font-family: Arial, sans-serif;

      overflow: hidden;
      text-align: center;
    }

    /* Kamera läuft im Hintergrund */
    #camera {
      position: fixed;

      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      object-fit: cover;

      opacity: 0.09;

      z-index: 1;
    }

    /* Dunkler Layer über der Kamera */
    .background-overlay {
      position: fixed;

      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      background:
        radial-gradient(circle at center, rgba(20, 80, 120, 0.18), rgba(0,0,0,0.94) 62%),
        linear-gradient(135deg, rgba(0, 120, 255, 0.10), rgba(255, 0, 0, 0.08));

      z-index: 2;
    }

    /* Haupt-App */
    .app {
      position: relative;

      z-index: 10;

      width: 100vw;
      height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      box-sizing: border-box;

      padding: 34px 22px 24px 22px;
    }

    /* Logo oben */
    .brand-logo {
      width: min(440px, 76vw);
      max-height: 150px;

      object-fit: contain;

      margin-bottom: 28px;

      filter: drop-shadow(0 0 16px rgba(255,255,255,0.16));
    }

    /* Fallback, falls logo file fehlt */
    .logo-fallback {
      display: none;

      font-size: 48px;
      font-weight: bold;
      letter-spacing: 3px;

      margin-bottom: 34px;
    }

    /* Scanner-Block */
    .scanner-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* QR Rahmen */
    .scan-frame {
      width: min(360px, 74vw);
      height: min(360px, 74vw);

      border: 3px solid rgba(120, 200, 255, 0.90);
      border-radius: 26px;

      box-shadow:
        0 0 18px rgba(80, 180, 255, 0.75),
        inset 0 0 22px rgba(80, 180, 255, 0.18);

      position: relative;

      margin-bottom: 28px;

      pointer-events: none;
    }

    /* Kleine Ecklinien im Scanner-Rahmen */
    .scan-frame::before,
    .scan-frame::after {
      content: "";

      position: absolute;

      width: calc(100% - 42px);
      height: calc(100% - 42px);

      top: 18px;
      left: 18px;

      border: 4px solid rgba(170, 220, 255, 0.95);
      border-radius: 18px;

      clip-path: polygon(
        0 0, 20% 0, 20% 6%, 6% 6%, 6% 20%, 0 20%,
        0 80%, 6% 80%, 6% 94%, 20% 94%, 20% 100%, 0 100%,
        80% 100%, 80% 94%, 94% 94%, 94% 80%, 100% 80%,
        100% 100%, 100% 0, 80% 0, 80% 6%, 94% 6%, 94% 20%, 100% 20%, 100% 0
      );
    }

    /* Ready Text */
    .ready-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #readyTitle {
      font-size: 36px;
      font-weight: bold;

      color: #4CAF50;

      margin-bottom: 14px;
    }

    #readySubtitle {
      font-size: 24px;

      color: #dddddd;

      margin-bottom: 18px;
    }

    /* Result Layout */
    .result-panel {
      display: none;

      width: min(920px, 94vw);

      grid-template-columns: 1fr 1.25fr;
      gap: 24px;

      margin-top: 12px;
    }

    .result-left,
    .result-message {
      background: rgba(0, 0, 0, 0.58);

      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;

      box-shadow:
        0 0 24px rgba(0,0,0,0.45),
        inset 0 0 26px rgba(255,255,255,0.035);

      padding: 28px 24px;
    }

    .result-left {
      text-align: left;
    }

    .result-icon {
      width: 54px;
      height: 54px;

      border: 3px solid #4CAF50;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #4CAF50;
      font-size: 34px;
      font-weight: bold;

      margin-bottom: 18px;
    }

    #resultTitle {
      font-size: 28px;
      font-weight: bold;

      color: #4CAF50;

      margin-bottom: 14px;
    }

    #resultName {
      font-size: 52px;
      font-weight: bold;

      color: white;

      margin-bottom: 12px;
    }

    #resultTraining {
      font-size: 22px;
      line-height: 1.35;

      color: #dddddd;
    }

    .result-message {
      text-align: center;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #messageLabel {
      font-size: 22px;
      font-weight: bold;

      color: #ffffff;

      margin-bottom: 18px;
    }

    #messageText {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.35;

      color: #ffffff;
    }

    /* Debug / Kamera Status */
    #debug {
      font-size: 16px;

      color: #777;

      max-width: 90%;
      word-break: break-word;

      margin-top: 10px;
    }

    /* Sound Hinweis */
    #soundHint {
      position: fixed;

      bottom: 18px;
      left: 0;

      width: 100%;

      font-size: 14px;
      color: #777;

      z-index: 20;
    }

    /* Mode: Ready */
    .mode-ready .result-panel {
      display: none;
    }

    .mode-ready .scanner-zone {
      display: flex;
    }

    /* Mode: Loading */
    .mode-loading .result-panel {
      display: none;
    }

    .mode-loading .scanner-zone {
      display: flex;
    }

    /* Mode: Result */
    .mode-result .scanner-zone {
      display: none;
    }

    .mode-result .result-panel {
      display: grid;
    }

    /* Mobile Portrait */
    @media (max-width: 700px) {

      .app {
        padding-top: 32px;
      }

      .brand-logo {
        width: min(360px, 82vw);
        margin-bottom: 26px;
      }

      #readyTitle {
        font-size: 30px;
      }

      #readySubtitle {
        font-size: 19px;
      }

      .scan-frame {
        width: min(330px, 78vw);
        height: min(330px, 78vw);
      }

      .result-panel {
        grid-template-columns: 1fr;

        gap: 14px;

        margin-top: 0;
      }

      .result-left,
      .result-message {
        padding: 22px 20px;
      }

      #resultName {
        font-size: 46px;
      }

      #messageText {
        font-size: 23px;
      }
    }

    /* Landscape */
    @media (orientation: landscape) and (max-height: 600px) {

      .app {
        padding-top: 18px;
      }

      .brand-logo {
        width: min(300px, 34vw);
        margin-bottom: 12px;
      }

      .scan-frame {
        width: 260px;
        height: 260px;

        margin-bottom: 16px;
      }

      #readyTitle {
        font-size: 28px;
      }

      #readySubtitle {
        font-size: 18px;
      }

      .result-panel {
        width: min(880px, 94vw);

        gap: 18px;
      }

      .result-left,
      .result-message {
        padding: 20px 22px;
      }

      #resultName {
        font-size: 40px;
      }

      #messageText {
        font-size: 22px;
      }
    }

  </style>
</head>

<body>

  <!-- Kamera -->
  <video id="camera" muted playsinline></video>

  <!-- Dunkler Hintergrund über der Kamera -->
  <div class="background-overlay"></div>

  <!-- Haupt-App -->
  <div id="app" class="app mode-ready">

    <!-- Logo -->
    <img
      class="brand-logo"
      src="axis-logo.png"
      alt="AXIS JIU-JITSU"
      onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';"
    >

    <div id="logoFallback" class="logo-fallback">
      AXIS JIU-JITSU
    </div>

    <!-- Ready / Scanner Screen -->
    <div class="scanner-zone">

      <div class="scan-frame"></div>

      <div class="ready-panel">

        <div id="readyTitle">
          Kamera startet...
        </div>

        <div id="readySubtitle">
          Bitte warten
        </div>

      </div>

    </div>

    <!-- Result Screen -->
    <div class="result-panel">

      <div class="result-left">

        <div class="result-icon">
          ✓
        </div>

        <div id="resultTitle">
          Check-In erfolgreich!
        </div>

        <div id="resultName"></div>

        <div id="resultTraining"></div>

      </div>

      <div class="result-message">

        <div id="messageLabel"></div>

        <div id="messageText"></div>

      </div>

    </div>

    <div id="debug"></div>

  </div>

  <div id="soundHint">
    Tippe einmal auf den Bildschirm, um Ton zu aktivieren
  </div>

</body>
</html>
