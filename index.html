<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXIS Check-In Scanner</title>

  <!-- Nimiq QR Scanner -->
  <script type="module">
    import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";

    // Apps Script Web App URL
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycby_D4IOfvuZbyheCOxZINd5x2tX6DD6iv6AtDOwcxSDgmYHq0jjjKytEDLOxBfGezJiKw/exec";

    let alreadyScanned = false;
    let scanner = null;

    window.addEventListener("DOMContentLoaded", async function () {

      const video = document.getElementById("camera");
      const status = document.getElementById("status");
      const debug = document.getElementById("debug");

      try {

        // Проверяем камеры
        const cameras = await QrScanner.listCameras(true);

        if (!cameras || cameras.length === 0) {
          status.innerText = "Kamera konnte nicht gestartet werden";
          debug.innerText = "Camera not found";
          return;
        }

        // По возможности выбираем заднюю камеру
        let selectedCamera = cameras.find(cam =>
          cam.label.toLowerCase().includes("back") ||
          cam.label.toLowerCase().includes("rear") ||
          cam.label.toLowerCase().includes("environment")
        );

        // Если заднюю не нашли — берём первую доступную
        if (!selectedCamera) {
          selectedCamera = cameras[0];
        }

        scanner = new QrScanner(
          video,
          result => {

            if (alreadyScanned) return;
            alreadyScanned = true;

            const scannedText = result.data || result;

            // Достаём id=AJJ001 из QR ссылки
            const match = scannedText.match(/[?&]id=([^&]+)/);

            if (!match) {
              status.innerText = "Ungültiger QR Code";
              debug.innerText = scannedText;
              alreadyScanned = false;
              return;
            }

            const memberId = decodeURIComponent(match[1]);

            status.innerText = "Check-In läuft...";
            debug.innerText = memberId;

            // Открываем Apps Script check-in
            window.location.href =
              WEB_APP_URL +
              "?id=" +
              encodeURIComponent(memberId) +
              "&scanner=1";
          },
          {
            highlightScanRegion: true,
            highlightCodeOutline: true,
            maxScansPerSecond: 25,
            returnDetailedScanResult: true
          }
        );

        // Запускаем выбранную камеру
        await scanner.setCamera(selectedCamera.id);
        await scanner.start();

        status.innerText = "Ready for Check-In";
        debug.innerText = "Kamera aktiv";

      } catch (err) {

        status.innerText = "Kamera konnte nicht gestartet werden";
        debug.innerText = String(err);
      }
    });
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0.08;
      z-index: 1;
    }

    .screen {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    #status {
      font-size: 32px;
      color: #4CAF50;
      margin-bottom: 15px;
    }

    #debug {
      font-size: 18px;
      color: #999;
      max-width: 90%;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <video id="camera" muted playsinline></video>

  <div class="screen">
    <div class="title">AXIS JIU-JITSU</div>
    <div id="status">Kamera startet...</div>
    <div id="debug">Bitte warten</div>
  </div>

</body>
</html>
