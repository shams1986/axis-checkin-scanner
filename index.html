<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- Нормальный размер на телефоне и планшете -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AXIS Check-In Scanner</title>

  <!-- Nimiq QR Scanner -->
  <script type="module">

    import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";

    // Worker для QR Scanner
    QrScanner.WORKER_PATH =
      "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js";

    // Apps Script Web App URL
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycby_D4IOfvuZbyheCOxZINd5x2tX6DD6iv6AtDOwcxSDgmYHq0jjjKytEDLOxBfGezJiKw/exec";

    // Через сколько секунд вернуться к Ready экрану
    const RESET_DELAY_MS = 4500;

    // Защита от повторного срабатывания одного QR
    let scanLocked = false;

    // AudioContext для звуков
    let audioContext = null;

    // HTML элементы
    let video;
    let app;
    let title;
    let nameBox;
    let subtitle;
    let debug;
    let soundHint;
    let resultMessageBox;
    let resultMessageLabel;
    let resultMessageText;


    /**
     * unlockSound()
     *
     * Мобильные браузеры часто блокируют звук,
     * пока пользователь один раз не нажмёт на экран.
     */
    function unlockSound() {

      try {

        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        audioContext.resume();

        if (soundHint) {
          soundHint.style.display = "none";
        }

      } catch (err) {
        // Если звук не активировался — check-in всё равно работает
      }
    }


    /**
     * playTone(frequency, startTime, duration, volume)
     *
     * Проигрывает один короткий тон.
     */
    function playTone(frequency, startTime, duration, volume) {

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;

      gain.gain.setValueAtTime(0.001, startTime);
      gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }


    /**
     * playSound(type)
     *
     * Играет разные звуки:
     * success   = успешный check-in
     * duplicate = уже отмечен
     * error     = ошибка
     */
    function playSound(type) {

      try {

        if (!audioContext) {
          return;
        }

        const now = audioContext.currentTime;

        if (type === "success") {

          // Успешный check-in
          playTone(660, now, 0.18, 0.45);
          playTone(880, now + 0.14, 0.18, 0.45);
          playTone(1175, now + 0.28, 0.22, 0.38);

        } else if (type === "duplicate") {

          // Повторный check-in
          playTone(420, now, 0.18, 0.42);
          playTone(420, now + 0.25, 0.18, 0.42);

        } else {

          // Ошибка
          playTone(220, now, 0.35, 0.45);
        }

      } catch (err) {
        // Если браузер заблокировал звук — check-in всё равно работает
      }
    }


    /**
     * vibrate(type)
     *
     * Лёгкая вибрация на телефоне,
     * если браузер это поддерживает.
     */
    function vibrate(type) {

      if (!navigator.vibrate) {
        return;
      }

      if (type === "success") {
        navigator.vibrate(80);
      } else if (type === "duplicate") {
        navigator.vibrate([60, 60, 60]);
      } else {
        navigator.vibrate(200);
      }
    }


    /**
     * setReadyScreen()
     *
     * Возвращает экран в режим ожидания.
     */
    function setReadyScreen() {

      app.className = "screen mode-ready";

      title.innerText = "Bereit für Check-In";
      title.style.color = "#4CAF50";

      nameBox.innerText = "";
      subtitle.innerText = "QR-Code vor die Kamera halten";
      debug.innerText = "● Kamera aktiv";

      resultMessageBox.style.display = "none";
      resultMessageLabel.innerText = "";
      resultMessageText.innerText = "";
    }


    /**
     * showResult(data)
     *
     * Показывает результат check-in,
     * который пришёл из Apps Script API.
     *
     * Важно:
     * мотивационные сообщения НЕ хранятся здесь.
     * Если Apps Script пришлёт messageLabel/message,
     * тогда scanner page просто покажет их.
     */
 function showResult(data) {

  const result = data.result || "success";

  app.className = "screen mode-result mode-" + result;

  title.innerText = data.title || "Check-In";
  title.style.color = data.color || "#4CAF50";

  nameBox.innerText = data.vorname || "";

  // Success bleibt deutsch und nutzt den Trainingsnamen.
  // Bei duplicate/error wird NICHT automatisch "Willkommen" angezeigt.
  if (result === "success" && data.trainingName) {
    subtitle.innerText = "Willkommen zum " + data.trainingName + ".";
  } else {
    subtitle.innerText = data.subtitle || "";
  }

  debug.innerText = "";

  resultMessageLabel.innerText = "";
  resultMessageLabel.style.display = "none";
  resultMessageText.innerText = "";
  resultMessageBox.style.display = "none";

  // Motivations-/Personal-Message nur bei erfolgreichem Check-In anzeigen.
  // Bei duplicate soll keine zweite Karte rechts erscheinen.
  if (result === "success" && data.message) {
    resultMessageBox.style.display = "block";
    resultMessageText.innerText = data.message;
  }

  // Fehler/ungültiger QR: Hinweis im selben Card-Layout anzeigen.
  if (result === "not_found" || result === "error" || result === "invalid") {
    if (data.subtitle) {
      resultMessageBox.style.display = "block";
      resultMessageText.innerText = data.subtitle;
    }
  }

  playSound(data.sound);
  vibrate(data.sound);

  setTimeout(function () {
    scanLocked = false;
    setReadyScreen();
  }, RESET_DELAY_MS);
}


    /**
     * extractMemberId(scannedText)
     *
     * Достаёт MemberID из QR-кода.
     */
    function extractMemberId(scannedText) {

      const text = String(scannedText).trim();

      try {

        const url = new URL(text);
        const id = url.searchParams.get("id");

        if (id) {
          return id;
        }

      } catch (err) {
        // Если это не URL — пробуем regex ниже
      }

      const match = text.match(/[?&]id=([^&]+)/);

      if (match) {
        return decodeURIComponent(match[1]);
      }

      // Запасной вариант, если когда-нибудь QR будет содержать только AJJ010
      if (/^AJJ[0-9]+$/i.test(text)) {
        return text;
      }

      return null;
    }


    /**
     * callCheckinApi(memberId)
     *
     * Отправляет MemberID в Apps Script API
     * без перехода на script.google.com.
     */
    function callCheckinApi(memberId) {

      const callbackName =
        "axisCheckinCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      const script = document.createElement("script");

      window[callbackName] = function (data) {

        // Удаляем временный script и callback
        delete window[callbackName];
        script.remove();

        // Показываем результат на scanner page
        showResult(data);
      };

      script.onerror = function () {

        delete window[callbackName];
        script.remove();

        showResult({
          result: "error",
          memberId: memberId,
          vorname: "",
          title: "❌ Verbindung Fehler",
          subtitle: "Bitte erneut versuchen.",
          color: "#F44336",
          sound: "error"
        });
      };

      script.src =
        WEB_APP_URL +
        "?api=checkin" +
        "&id=" + encodeURIComponent(memberId) +
        "&callback=" + encodeURIComponent(callbackName) +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }


    /**
     * onScanSuccess(result)
     *
     * Запускается, когда камера прочитала QR.
     */
    function onScanSuccess(result) {

      if (scanLocked) {
        return;
      }

      scanLocked = true;

      const scannedText = result.data || result;
      const memberId = extractMemberId(scannedText);

      if (!memberId) {

        showResult({
          result: "invalid",
          memberId: "",
          vorname: "",
          title: "❌ Ungültiger QR Code",
          subtitle: "Bitte Trainer informieren.",
          color: "#F44336",
          sound: "error"
        });

        return;
      }

      app.className = "screen mode-loading";

      title.innerText = "Check-In läuft...";
      title.style.color = "#2196F3";
      nameBox.innerText = "";
      subtitle.innerText = "Bitte kurz warten.";
      debug.innerText = "";

      resultMessageBox.style.display = "none";

      callCheckinApi(memberId);
    }


    /**
     * startScanner()
     *
     * Запускает камеру и QR Scanner.
     */
    async function startScanner() {

      video = document.getElementById("camera");
      app = document.getElementById("screen");

      title = document.getElementById("title");
      nameBox = document.getElementById("name");
      subtitle = document.getElementById("subtitle");
      debug = document.getElementById("debug");
      soundHint = document.getElementById("soundHint");

      resultMessageBox = document.getElementById("resultMessageBox");
      resultMessageLabel = document.getElementById("resultMessageLabel");
      resultMessageText = document.getElementById("resultMessageText");

      try {

        const scanner = new QrScanner(
          video,
          onScanSuccess,
          {
            preferredCamera: "user",
            maxScansPerSecond: 30,
            returnDetailedScanResult: true
          }
        );

        await scanner.start();

        setReadyScreen();

      } catch (err) {

        title.innerText = "Kamera konnte nicht gestartet werden";
        title.style.color = "#F44336";

        subtitle.innerText = "Bitte Kamera-Berechtigung prüfen.";
        debug.innerText = String(err);
      }
    }


    // Sound durch ersten Tap aktivieren
    document.addEventListener("click", unlockSound);
    document.addEventListener("touchstart", unlockSound);

    // Scanner starten, sobald die Seite geladen ist
    window.addEventListener("DOMContentLoaded", startScanner);

  </script>

  <style>

    body {
      margin: 0;
      padding: 0;

      background: #050505;
      color: white;

      font-family: Arial, sans-serif;

      overflow: hidden;
      text-align: center;
    }

    /* Камера работает на фоне */
    #camera {
      position: fixed;

      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      object-fit: cover;

      opacity: 0.08;

      z-index: 1;
    }

    /* Основной экран */
    .screen {
      position: relative;

      z-index: 10;

      width: 100vw;
      height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      box-sizing: border-box;
      padding-top: 34px;
    }

    /* Логотип сверху */
    .logo {
      margin-bottom: 26px;
    }

    .logo img {
      width: min(390px, 78vw);
      max-height: 130px;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.18));
    }

    /* Ready зона: логотип → рамка → текст */
    .ready-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Рамка сканирования */
    .scan-frame {
      width: min(360px, 76vw);
      height: min(360px, 76vw);

      border: 3px solid rgba(255,255,255,0.28);
      border-radius: 22px;

      box-shadow: 0 0 40px rgba(33,150,243,0.35);

      margin-bottom: 28px;

      pointer-events: none;
    }

    #title {
      font-size: 38px;
      font-weight: bold;

      color: #4CAF50;

      margin-bottom: 10px;
    }

    #name {
      font-size: 62px;
      font-weight: bold;

      margin-bottom: 14px;
    }

    #subtitle {
      font-size: 25px;

      color: #cccccc;

      margin-bottom: 16px;
    }

    #debug {
      font-size: 17px;

      color: #777;

      max-width: 90%;
      word-break: break-word;
    }


    .result-main {
      box-sizing: border-box;
    }

    /* Блок сообщения после check-in */
    .result-message-box {
      display: none;

      margin-top: 22px;

      width: 100%;
      box-sizing: border-box;

      background: rgba(255, 255, 255, 0.06);

      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;

      padding: 20px 22px;

      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    #resultMessageLabel {
      font-size: 20px;
      font-weight: bold;

      margin-bottom: 10px;

      color: #ffffff;
    }

    #resultMessageText {
      font-size: 25px;
      font-weight: bold;
      line-height: 1.35;

      color: #ffffff;
    }

    /* В режиме результата рамку прячем */
    .mode-result .scan-frame {
      display: none;
    }

    .mode-result .logo {
      margin-bottom: 22px;
    }

    .mode-result .ready-zone {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mode-result .result-main {
      width: min(720px, 90vw);
      text-align: left;
      background: rgba(0,0,0,0.52);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 30px;
      box-shadow: 0 0 30px rgba(0,0,0,0.45);
    }

    .mode-duplicate #subtitle {
      color: #ffffff;
      font-weight: 600;
    }


    .mode-result #title {
      font-size: 34px;
      margin-bottom: 16px;
    }

    .mode-result #name {
      font-size: 64px;
    }

    /* Маленькая подсказка про звук */
    #soundHint {
      position: fixed;

      bottom: 18px;
      left: 0;

      width: 100%;

      font-size: 14px;
      color: #777;

      z-index: 20;
    }

    /* Горизонтальный экран: результат слева, сообщение справа */
    @media (orientation: landscape) and (min-width: 800px) {

      .screen {
        padding-top: 22px;
      }

      .logo {
        margin-bottom: 18px;
      }

      .logo img {
        width: min(330px, 36vw);
        max-height: 100px;
      }

      .scan-frame {
        width: 320px;
        height: 320px;
      }

      .mode-result .ready-zone {
        width: min(720px, 90vw);

        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      .mode-result .result-main {
        width: 100%;
        text-align: left;

        background: rgba(0,0,0,0.52);

        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;

        padding: 30px 34px;
        box-shadow: 0 0 30px rgba(0,0,0,0.45);
      }

      .mode-result .result-message-box {
        width: 100%;
        margin-top: 22px;
      }

      .mode-result #title {
        font-size: 30px;
      }

      .mode-result #name {
        font-size: 54px;
      }

      .mode-result #subtitle {
        font-size: 22px;
      }

      .mode-result #resultMessageText {
        font-size: 26px;
      }
    }

    /* Низкий горизонтальный экран */
    @media (orientation: landscape) and (max-height: 620px) {

      .screen {
        padding-top: 16px;
      }

      .logo img {
        width: min(280px, 34vw);
      }

      .scan-frame {
        width: 260px;
        height: 260px;
        margin-bottom: 16px;
      }

      #title {
        font-size: 30px;
      }

      #name {
        font-size: 46px;
      }

      #subtitle {
        font-size: 20px;
      }
    }

  </style>
</head>

<body>

  <!-- Камера -->
  <video id="camera" muted playsinline></video>

  <!-- Основной экран -->
  <div id="screen" class="screen mode-ready">

    <!-- Логотип AXIS сверху -->
    <div class="logo">
      <img src="axis-logo.png" alt="AXIS JIU-JITSU">
    </div>

    <!-- Ready / Result зона -->
    <div class="ready-zone">

      <!-- Рамка сканирования -->
      <div class="scan-frame"></div>

      <!-- Основной текст результата или ready-экрана -->
      <div class="result-main">

        <div id="title">
          Kamera startet...
        </div>

        <div id="name"></div>

        <div id="subtitle">
          Bitte warten
        </div>

        <div id="debug"></div>

        <!-- Сообщение после check-in.
             Содержимое приходит из Apps Script API. -->
        <div id="resultMessageBox" class="result-message-box">
          <div id="resultMessageLabel"></div>
          <div id="resultMessageText"></div>
        </div>

      </div>

    </div>

  </div>

  <div id="soundHint">
    Tippe einmal auf den Bildschirm, um Ton zu aktivieren
  </div>

</body>
</html>
